name: Go

on:
  push:
    branches: [main, develop]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

jobs:
  build:
    name: Build and Vet
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Install dependencies
        run: go mod download

      - name: Build project
        run: go build -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt
        run: gofmt -w .

      - name: Show formatting changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "Files were reformatted by gofmt:"
            git diff --name-only
            echo "Please run 'gofmt -w .' locally and commit the changes"
            exit 1
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: 'go.sum'

      - name: Install dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -v ./...

      - name: Run Go tests with race detector
        run: go test -race -v ./...
